<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Healthy music | WellSpring</title>
</head>
<body>
  <div id="app-nav"></div>
  <main>
    <section class="page-head music-head">
      <div class="container">
        <div class="row align-items-center g-4">
          <div class="col-lg-7"><div class="eyebrow">Listen with intention</div><h1>Sound for a softer mind.</h1><p class="page-intro">Gentle, original ambient previews designed to support concentration, rest, or a quiet pause.</p></div>
          <div class="col-lg-5"><div class="sound-tip"><i class="bi bi-headphones"></i><div><strong>Headphones recommended</strong><small>Begin at a low volume and choose a comfortable level.</small></div></div></div>
        </div>
      </div>
    </section>

    <section class="section pt-2 music-library">
      <div class="container">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
          <div><div class="eyebrow">Sound library</div><h2 class="h3 mb-0">Choose your atmosphere</h2></div>
          <div class="d-flex flex-wrap gap-2" aria-label="Sound categories">
            <button class="filter-chip active" data-kind="All">All</button>
            <button class="filter-chip" data-kind="Nature">Nature</button>
            <button class="filter-chip" data-kind="Ambient">Ambient</button>
            <button class="filter-chip" data-kind="Instrumental">Instrumental</button>
          </div>
        </div>
        <div id="tracks" class="row g-4" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <div id="player" class="now-playing" aria-live="polite" hidden>
    <div class="container player-inner">
      <button id="player-toggle" class="player-main-button" aria-label="Pause current sound"><i class="bi bi-pause-fill"></i></button>
      <div class="player-copy"><small>Now playing</small><strong id="player-title">Select a sound</strong></div>
      <div class="player-progress-wrap"><div class="player-times"><span id="player-elapsed">0:00</span><span id="player-duration">25:00</span></div><div class="player-progress"><span id="player-progress"></span></div></div>
      <label class="volume-control"><i class="bi bi-volume-down"></i><input id="volume" type="range" min="0" max="100" value="28" aria-label="Preview volume"><i class="bi bi-volume-up"></i></label>
      <button id="player-close" class="btn btn-sm btn-outline-light" aria-label="Stop and close player"><i class="bi bi-x-lg"></i></button>
    </div>
  </div>

  <div id="app-footer"></div>
  <script type="module" src="/src/js/pages/music.js"></script>
</body>
</html>
