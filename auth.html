<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign in · WellSpring</title></head><body><div id="app-nav"></div><main class="auth-shell"><div class="container"><div class="soft-card auth-card"><div class="icon-tile mb-3"><i class="bi bi-person-heart"></i></div><h1 id="auth-title" class="h2">Welcome back</h1><p class="text-secondary">Continue building your healthier rhythm.</p><form id="auth-form"><div id="name-wrap" class="d-none mb-3"><label class="form-label" for="fullName">Name</label><input id="fullName" name="fullName" class="form-control"></div><div class="mb-3"><label class="form-label" for="email">Email</label><input id="email" name="email" type="email" class="form-control" required></div><div class="mb-3"><label class="form-label" for="password">Password</label><input id="password" name="password" type="password" minlength="6" class="form-control" required></div><button id="submit-auth" class="btn btn-primary w-100">Sign in</button></form><button id="toggle-auth" class="btn btn-link text-success w-100 mt-2">Need an account? Sign up</button><small class="d-block text-secondary text-center">Demo: use any email and password. Start email with admin for admin access.</small></div></div></main><div id="app-footer"></div><script type="module" src="/src/js/pages/auth.js"></script></body></html>
